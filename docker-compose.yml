services:
  # ──────────────────────────────────────────────────────────────
  # Postgres — used when DB_MODE=docker (set by scripts/setup.mjs).
  # Started in isolation during setup with:
  #   docker compose up -d postgres
  # Persists data in the named volume `ultratable_pg_data`.
  # ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - ultratable_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  service:
    build:
      context: .
      dockerfile: apps/service/Dockerfile
    restart: always
    ports:
      - "8080:8080"
    env_file:
      - apps/service/.env
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=8080
      - HOST=0.0.0.0
      - LOG_LEVEL=${LOG_LEVEL:-debug}
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:8080/healthz" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  ultratable_pg_data:
