services:
  service:
    build:
      context: .
      dockerfile: apps/service/Dockerfile
    restart: always
    ports:
      - "8080:8080"
    env_file:
      - apps/service/.env
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=8080
      - HOST=0.0.0.0
      - LOG_LEVEL=${LOG_LEVEL:-debug}
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:8080/healthz" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
