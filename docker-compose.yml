services:
    # ──────────────────────────────────────────────────────────────
    # Postgres — used when DB_MODE=docker (set by scripts/setup.mjs).
    # Started in isolation during setup with:
    #   docker compose up -d postgres
    # Persists data in the named volume `ultratable_pg_data`.
    # Host port is configurable via POSTGRES_PORT in the root .env
    # so setup.mjs can step around a shadowing Homebrew postgres
    # (issue #122). Container port stays 5432.
    # ──────────────────────────────────────────────────────────────
    postgres:
        image: postgres:16-alpine
        restart: unless-stopped
        ports:
            - '${POSTGRES_PORT:-5432}:5432'
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: postgres
        volumes:
            - ultratable_pg_data:/var/lib/postgresql/data
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U postgres -d postgres']
            interval: 5s
            timeout: 3s
            retries: 10
            start_period: 5s

    # ──────────────────────────────────────────────────────────────
    # MinIO — S3-compatible blob storage used when DB_MODE=docker.
    # Started in isolation during setup with:
    #   docker compose up -d minio
    # Persists data in the named volume `ultratable_minio_data`.
    # Host ports are configurable via MINIO_API_PORT / MINIO_CONSOLE_PORT
    # in the root .env so setup.mjs can sidestep collisions (issue #122);
    # container ports stay 9000 (S3 API) and 9001 (web console).
    # The application creates and configures the `graphics` bucket
    # automatically — no bucket-init container required.
    # ──────────────────────────────────────────────────────────────
    minio:
        image: minio/minio:latest
        restart: unless-stopped
        command: server /data --console-address ":9001"
        ports:
            - '${MINIO_API_PORT:-9000}:9000'
            - '${MINIO_CONSOLE_PORT:-9001}:9001'
        environment:
            MINIO_ROOT_USER: root
            MINIO_ROOT_PASSWORD: root12345
        volumes:
            - ultratable_minio_data:/data
        healthcheck:
            test: ['CMD', 'mc', 'ready', 'local']
            interval: 5s
            timeout: 3s
            retries: 10
            start_period: 5s

    service:
        build:
            context: .
            dockerfile: apps/service/Dockerfile
            args:
                # Forwarded to the Dockerfile's `ARG PORT` so EXPOSE matches
                # the actual bound port. Operator overrides SERVICE_PORT in
                # the host env / root .env (see issue #120).
                PORT: ${SERVICE_PORT:-8080}
        restart: always
        ports:
            - '${SERVICE_PORT:-8080}:${SERVICE_PORT:-8080}'
        env_file:
            - apps/service/.env
        environment:
            - NODE_ENV=${NODE_ENV:-development}
            - PORT=${SERVICE_PORT:-8080}
            - HOST=0.0.0.0
            - LOG_LEVEL=${LOG_LEVEL:-debug}
        healthcheck:
            test:
                [
                    'CMD',
                    'wget',
                    '--spider',
                    '-q',
                    'http://localhost:${SERVICE_PORT:-8080}/healthz',
                ]
            interval: 30s
            timeout: 5s
            retries: 3
            start_period: 10s

volumes:
    ultratable_pg_data:
    ultratable_minio_data:
