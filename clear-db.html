<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clear UltraTable Database</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            padding: 40px;
            background: #1a1a1a;
            color: #e0e0e0;
            max-width: 600px;
            margin: 0 auto;
        }
        h1 {
            color: #4CAF50;
        }
        button {
            background: #f44336;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            margin: 10px 5px;
        }
        button:hover {
            background: #d32f2f;
        }
        .safe {
            background: #2196F3;
        }
        .safe:hover {
            background: #1976D2;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            border-left: 3px solid #4CAF50;
        }
        .error {
            border-left-color: #f44336;
            color: #ff6b6b;
        }
        .info {
            background: rgba(33, 150, 243, 0.1);
            border-left: 3px solid #2196F3;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <h1>Clear UltraTable Database</h1>

    <div class="info">
        <strong>Why clear?</strong><br>
        We changed how graphic IDs are generated. Old data with prefixed IDs (like <code>team_logo_1000</code>)
        needs to be cleared so new random Base32 NanoIDs (like <code>7xp9k2m8qwza</code>) can be created.
    </div>

    <button onclick="clearAll()">🗑️ Clear Everything</button>
    <button onclick="clearGraphicsOnly()" class="safe">🖼️ Clear Graphics Only</button>
    <button onclick="showStats()" class="safe">📊 Show Database Stats</button>

    <div id="result"></div>

    <script>
        async function clearAll() {
            try {
                const result = document.getElementById('result');
                result.innerHTML = '<div class="result">Deleting database...</div>';

                await new Promise((resolve, reject) => {
                    const req = indexedDB.deleteDatabase('ultratable');
                    req.onsuccess = resolve;
                    req.onerror = reject;
                });

                result.innerHTML = '<div class="result">✅ Database completely deleted! Refresh the app to start fresh.</div>';
            } catch (err) {
                document.getElementById('result').innerHTML =
                    `<div class="result error">❌ Error: ${err.message}</div>`;
            }
        }

        async function clearGraphicsOnly() {
            try {
                const result = document.getElementById('result');
                result.innerHTML = '<div class="result">Clearing graphics...</div>';

                // Open database
                const db = await new Promise((resolve, reject) => {
                    const req = indexedDB.open('ultratable', 2);
                    req.onsuccess = () => resolve(req.result);
                    req.onerror = () => reject(req.error);
                });

                // Clear graphics and blobs tables
                const tx = db.transaction(['graphics', 'blobs'], 'readwrite');
                const graphicsStore = tx.objectStore('graphics');
                const blobsStore = tx.objectStore('blobs');

                const graphicsCount = await graphicsStore.count();
                const blobsCount = await blobsStore.count();

                await graphicsStore.clear();
                await blobsStore.clear();

                db.close();

                result.innerHTML = `<div class="result">✅ Cleared ${graphicsCount} graphics and ${blobsCount} blobs! Refresh the app.</div>`;
            } catch (err) {
                document.getElementById('result').innerHTML =
                    `<div class="result error">❌ Error: ${err.message}</div>`;
            }
        }

        async function showStats() {
            try {
                const result = document.getElementById('result');
                result.innerHTML = '<div class="result">Loading stats...</div>';

                const db = await new Promise((resolve, reject) => {
                    const req = indexedDB.open('ultratable', 2);
                    req.onsuccess = () => resolve(req.result);
                    req.onerror = () => reject(req.error);
                });

                const tables = ['cache', 'blobs', 'quotas', 'leagues', 'settings', 'mockData', 'logs', 'graphics'];
                const stats = {};

                for (const table of tables) {
                    try {
                        const tx = db.transaction(table, 'readonly');
                        const store = tx.objectStore(table);
                        stats[table] = await store.count();
                    } catch (e) {
                        stats[table] = 'N/A';
                    }
                }

                db.close();

                let html = '<div class="result"><strong>Database Stats:</strong><br><br>';
                for (const [table, count] of Object.entries(stats)) {
                    html += `${table}: <strong>${count}</strong> records<br>`;
                }
                html += '</div>';

                result.innerHTML = html;
            } catch (err) {
                document.getElementById('result').innerHTML =
                    `<div class="result error">❌ Error: ${err.message}</div>`;
            }
        }
    </script>
</body>
</html>
